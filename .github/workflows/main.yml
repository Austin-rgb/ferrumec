name: Clean Cargo.toml for Production

on:
  push:
    branches: [main]

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disable local patch overrides
        run: |
          awk '
          /^\[patch\."https:\/\/github\.com/ { in_patch=1 }
          /^\[/ && !/^\[patch\./ { in_patch=0 }
          {
            if (in_patch && $0 !~ /^#/) {
              print "# " $0
            } else {
              print $0
            }
          }
          ' Cargo.toml > Cargo.tmp && mv Cargo.tmp Cargo.toml
      - name: Verify result
        run: cat Cargo.toml
